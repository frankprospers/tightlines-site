<!DOCTYPE html>
<html class="staticrypt-html">
<head>
<meta charset="utf-8" />
<title>Tight Lines</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="cache-control" content="no-cache" />
<meta http-equiv="expires" content="0" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Oswald:wght@400;500;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:'Oswald',sans-serif;background:#1a1530;overflow:hidden}
  .hidden{display:none !important}

  .tl-loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:linear-gradient(180deg,#241c3e 0%,#7d3a4c 46%,#d98a45 70%,#12625f 71%)}
  .tl-loading .ld-txt{font-family:'Pacifico',cursive;color:#fff0f5;font-size:30px;text-shadow:0 0 14px #ff3d8a}
  .tl-spin{width:40px;height:40px;border:4px solid rgba(255,255,255,.35);border-right-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{100%{transform:rotate(360deg)}}

  .tl-screen{position:fixed;inset:0;overflow:hidden;isolation:isolate}
  .tl-sky{position:absolute;inset:0;background:linear-gradient(180deg,#241d3f 0%,#3f2a4e 16%,#6e3a4f 33%,#a85440 49%,#cf7a3c 60%,#e8a64f 67%,#f4cd83 70.5%,#f7d994 71.5%)}
  .tl-water{position:absolute;left:0;right:0;top:71%;bottom:0;background:linear-gradient(180deg,#2a8d7e 0%,#125f5b 42%,#08373f 78%,#05272e 100%)}
  .tl-water::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(180deg,rgba(255,255,255,.09) 0 1px,transparent 1px 15px);opacity:.55}
  .tl-sun{position:absolute;left:50%;top:60%;transform:translate(-50%,-50%);width:min(230px,40vw);height:min(230px,40vw);border-radius:50%;background:radial-gradient(circle at 50% 45%,#fff1c8 0,#ffd684 44%,#f29c45 78%,#e0763a 100%);box-shadow:0 0 130px 46px rgba(255,170,90,.45);animation:sunpulse 8s ease-in-out infinite}
  .tl-glow{position:absolute;left:50%;top:71%;transform:translateX(-50%);width:240px;height:230px;background:linear-gradient(180deg,rgba(255,210,130,.7),rgba(255,200,120,0));mix-blend-mode:screen;filter:blur(3px);animation:shimmer 6s ease-in-out infinite}

  .tl-stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.7;animation:tw 4s ease-in-out infinite}
  .tl-bird{position:absolute;stroke:#3a2a2e;stroke-width:2.4;fill:none;opacity:.65}

  .tl-treeline{position:absolute;left:0;right:0;top:62%;height:12%}
  .tl-treeline svg{width:100%;height:100%;display:block}

  .tl-lights{position:absolute;top:0;left:0;right:0;height:90px;z-index:4}
  .tl-lights svg{width:100%;height:100%;display:block}
  .tl-bulb{animation:bulb 5s ease-in-out infinite}

  .tl-mangrove{position:absolute;bottom:0;z-index:3}
  .tl-mangrove svg{display:block}
  .tl-dock{position:absolute;bottom:0;left:0;z-index:3}
  .tl-rig{position:absolute;inset:0;z-index:3;pointer-events:none}
  .tl-rig svg{width:100%;height:100%;display:block}

  .tl-tarpon{position:absolute;left:50%;top:42%;width:min(540px,72vw);margin-left:calc(min(540px,72vw) / -2);margin-top:calc(min(540px,72vw) * -0.30);transform:rotate(-58deg);animation:float 7s ease-in-out infinite;z-index:2;will-change:transform}
  .tl-tarpon svg{width:100%;height:auto;display:block;filter:drop-shadow(0 20px 26px rgba(0,0,0,.4))}

  .tl-sign{position:absolute;top:7vh;left:50%;transform:translateX(-50%);text-align:center;z-index:6;width:min(560px,90vw)}
  .tl-board{position:relative;display:inline-block;padding:14px 34px 16px;border-radius:10px;background:linear-gradient(180deg,#5a3c24,#3c2716);border:2px solid #271708;box-shadow:0 10px 26px rgba(0,0,0,.5),inset 0 2px 0 rgba(255,255,255,.08),inset 0 -3px 8px rgba(0,0,0,.5)}
  .tl-board::before,.tl-board::after{content:'';position:absolute;top:-16px;width:4px;height:18px;background:#2a1a0c}
  .tl-board::before{left:24%} .tl-board::after{right:24%}
  .tl-grain{position:absolute;inset:0;border-radius:10px;background:repeating-linear-gradient(180deg,rgba(0,0,0,.12) 0 2px,rgba(255,255,255,.03) 2px 7px);pointer-events:none;opacity:.5}
  .tl-screw{position:absolute;width:7px;height:7px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#caa,#5c4a3a);box-shadow:inset 0 0 0 1px rgba(0,0,0,.4)}
  .tl-scr{position:relative;font-family:'Pacifico',cursive;font-size:min(72px,12vw);line-height:.9;color:#fff0f5;text-shadow:0 0 6px #ff6fa5,0 0 14px #ff3d8a,0 0 30px #ff2f7a,0 0 54px #d61f6a;animation:flicker 8s linear infinite}
  .tl-sub{position:relative;margin-top:8px;font-family:'Special Elite',monospace;letter-spacing:.18em;font-size:min(15px,3.6vw);color:#f3dca2;text-shadow:0 1px 2px rgba(0,0,0,.7)}

  .tl-card{position:absolute;left:50%;bottom:5vh;transform:translateX(-50%);width:372px;max-width:88vw;background:rgba(20,14,8,.66);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);border:1px solid rgba(214,168,96,.55);border-radius:14px;padding:20px 22px 18px;text-align:center;z-index:7;box-shadow:0 16px 44px rgba(0,0,0,.55);animation:rise 1s ease both}
  .tl-card .hd{font-family:'Special Elite',monospace;letter-spacing:.1em;font-size:15px;color:#ffd483;text-shadow:0 1px 2px rgba(0,0,0,.6)}
  .tl-card .ins{margin:6px 0 14px;font-size:13.5px;color:#e6dcc6;font-weight:400;line-height:1.45}
  .staticrypt-password-container{position:relative;display:flex;align-items:center;background:rgba(247,242,230,.96);border-radius:9px;overflow:hidden;margin-bottom:11px}
  #staticrypt-password{flex:1;border:0;outline:0;background:transparent;font-family:'Oswald',sans-serif;font-size:16px;color:#2a1c10;padding:13px 44px 13px 14px;width:100%}
  #staticrypt-password::placeholder{color:#8a7a64}
  .staticrypt-toggle-password-visibility{position:absolute;right:0;top:50%;transform:translateY(-50%);width:20px;height:20px;padding:12px;cursor:pointer;opacity:.55}
  .staticrypt-remember{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:#d9c9a8;margin-bottom:12px;font-weight:400}
  .staticrypt-remember input{transform:scale(1.2)}
  .staticrypt-decrypt-button{width:100%;border:0;cursor:pointer;border-radius:9px;padding:14px;font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.16em;font-size:15px;text-transform:uppercase;color:#3a1402;background:linear-gradient(180deg,#ffd66b,#f09a35);box-shadow:0 5px 0 #b35e1a,0 10px 20px rgba(0,0,0,.4);transition:transform .08s,box-shadow .08s}
  .staticrypt-decrypt-button:hover{filter:brightness(1.04)}
  .staticrypt-decrypt-button:active{transform:translateY(4px);box-shadow:0 1px 0 #b35e1a,0 4px 10px rgba(0,0,0,.3)}

  @keyframes float{0%,100%{transform:rotate(-50deg) translateY(0)}50%{transform:rotate(-50deg) translateY(-9px)}}
  @keyframes shimmer{0%,100%{opacity:.45;transform:translateX(-50%) scaleY(.9)}50%{opacity:.85;transform:translateX(-50%) scaleY(1.08)}}
  @keyframes sunpulse{0%,100%{box-shadow:0 0 130px 46px rgba(255,170,90,.4)}50%{box-shadow:0 0 165px 58px rgba(255,185,110,.6)}}
  @keyframes flicker{0%,96%,100%{opacity:1}97%{opacity:.62}98%{opacity:.9}99%{opacity:.7}}
  @keyframes rise{0%{opacity:0;transform:translateX(-50%) translateY(18px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes tw{0%,100%{opacity:.25}50%{opacity:.85}}
  @keyframes bulb{0%,100%{opacity:.85}50%{opacity:1}}
  @media (max-width:560px){.tl-mangrove.r{display:none}}
  @media (prefers-reduced-motion:reduce){.tl-tarpon,.tl-glow,.tl-sun,.tl-scr,.tl-card,.tl-bulb,.tl-stars i{animation:none}.tl-tarpon{transform:rotate(-50deg)}}
</style>
</head>
