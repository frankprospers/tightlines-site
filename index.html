<!DOCTYPE html>
<html class="staticrypt-html">
<head>
<meta charset="utf-8" />
<title>Tight Lines</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="cache-control" content="no-cache" />
<meta http-equiv="expires" content="0" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:'Oswald',sans-serif;background:#201a40;overflow:hidden}
  .hidden{display:none !important}

  .tl-loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:linear-gradient(180deg,#201a40 0%,#8e2f63 45%,#ff8a3c 72%,#2bb6a6 73%)}
  .tl-loading .ld-txt{font-family:'Pacifico',cursive;color:#fff0f5;font-size:30px;text-shadow:0 0 14px #ff3d8a}
  .tl-spin{width:40px;height:40px;border:4px solid rgba(255,255,255,.35);border-right-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{100%{transform:rotate(360deg)}}

  .tl-screen{position:fixed;inset:0;overflow:hidden;isolation:isolate}
  .tl-sky{position:absolute;inset:0;background:linear-gradient(180deg,#1c1742 0%,#46215c 20%,#8a2d62 38%,#d8462f 55%,#ff8a3c 65%,#ffd36b 70.5%,#ffe7a6 71.5%)}
  .tl-water{position:absolute;left:0;right:0;top:71%;bottom:0;background:linear-gradient(180deg,#2bb6a6 0%,#0c7077 46%,#053f50 100%)}
  .tl-water::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(180deg,rgba(255,255,255,.10) 0 1px,transparent 1px 16px);opacity:.5}
  .tl-sun{position:absolute;left:50%;top:39%;transform:translate(-50%,-50%);width:min(260px,42vw);height:min(260px,42vw);border-radius:50%;background:radial-gradient(circle at 50% 42%,#fff4cf,#ffd36b 42%,#ff9b3d 74%,#ff5f3c);box-shadow:0 0 120px 44px rgba(255,150,70,.5);animation:sunpulse 7s ease-in-out infinite}
  .tl-sun::after{content:'';position:absolute;left:-3px;right:-3px;top:52%;bottom:-2px;background:repeating-linear-gradient(180deg,transparent 0 12px,#8a2d62 12px 19px)}
  .tl-glit{position:absolute;left:50%;top:71%;transform:translateX(-50%);width:200px;height:210px;background:linear-gradient(180deg,rgba(255,222,150,.7),rgba(255,210,140,0));mix-blend-mode:screen;filter:blur(2px);animation:shimmer 5s ease-in-out infinite}
  .tl-cloud{position:absolute;height:8px;border-radius:8px;background:rgba(255,205,150,.5);filter:blur(1px)}

  .tl-palm{position:absolute;bottom:0;width:200px;height:330px}
  .tl-palm svg{width:100%;height:100%;display:block}
  .tl-frond{transform-origin:60% 18%;animation:sway 6s ease-in-out infinite}

  .tl-tarpon{position:absolute;left:50%;top:45%;width:min(660px,80vw);margin-left:calc(min(660px,80vw) / -2);margin-top:calc(min(660px,80vw) * -0.30);transform:rotate(-19deg);animation:float 6.5s ease-in-out infinite;will-change:transform}
  .tl-tarpon svg{width:100%;height:auto;display:block;filter:drop-shadow(0 22px 30px rgba(0,0,0,.4))}

  .tl-sign{position:absolute;top:4vh;left:0;right:0;text-align:center;z-index:5;padding:0 16px}
  .tl-sign .scr{font-family:'Pacifico',cursive;font-size:min(84px,13vw);line-height:.9;color:#fff0f5;text-shadow:0 0 7px #ff6fa5,0 0 16px #ff3d8a,0 0 34px #ff2f7a;animation:flicker 8s linear infinite}
  .tl-sign .king{margin-top:22px;font-weight:700;letter-spacing:.4em;font-size:min(30px,6vw);color:#ffe07f;text-shadow:0 0 4px rgba(0,0,0,.75),0 2px 7px rgba(0,0,0,.6),0 0 16px rgba(255,170,60,.5);padding-left:.4em}
  .tl-sign .sub{margin-top:7px;font-weight:500;letter-spacing:.32em;font-size:min(12px,3vw);color:#ffe1a6;opacity:.92;text-shadow:0 1px 5px rgba(0,0,0,.5)}

  .tl-card{position:absolute;left:50%;bottom:4.5vh;transform:translateX(-50%);width:372px;max-width:88vw;background:rgba(9,27,33,.66);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);border:1px solid rgba(255,206,120,.55);border-radius:16px;padding:20px 22px 16px;text-align:center;z-index:6;box-shadow:0 16px 44px rgba(0,0,0,.5);animation:rise 1s ease both}
  .tl-card .hd{font-weight:700;letter-spacing:.18em;font-size:14px;color:#ffd36b;text-transform:uppercase}
  .tl-card .ins{margin:6px 0 14px;font-size:13.5px;color:#cfeee8;font-weight:400;line-height:1.45}
  .staticrypt-password-container{position:relative;display:flex;align-items:center;background:rgba(255,255,255,.95);border-radius:10px;overflow:hidden;margin-bottom:11px}
  #staticrypt-password{flex:1;border:0;outline:0;background:transparent;font-family:'Oswald',sans-serif;font-size:16px;color:#0c2a24;padding:13px 44px 13px 14px;width:100%}
  #staticrypt-password::placeholder{color:#6f8a84}
  .staticrypt-toggle-password-visibility{position:absolute;right:0;top:50%;transform:translateY(-50%);width:20px;height:20px;padding:12px;cursor:pointer;opacity:.55}
  .staticrypt-remember{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:#bfe7df;margin-bottom:12px;font-weight:400}
  .staticrypt-remember input{transform:scale(1.2)}
  .staticrypt-decrypt-button{width:100%;border:0;cursor:pointer;border-radius:10px;padding:14px;font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.18em;font-size:15px;text-transform:uppercase;color:#3a1402;background:linear-gradient(180deg,#ffd66b,#ff9f3c);box-shadow:0 5px 0 #c96a1e,0 10px 20px rgba(0,0,0,.4);transition:transform .08s,box-shadow .08s}
  .staticrypt-decrypt-button:hover{filter:brightness(1.03)}
  .staticrypt-decrypt-button:active{transform:translateY(4px);box-shadow:0 1px 0 #c96a1e,0 4px 10px rgba(0,0,0,.3)}
  .tl-foot{margin-top:11px;font-size:11px;letter-spacing:.14em;color:#9fd0c8;text-transform:uppercase}

  @keyframes float{0%,100%{transform:rotate(-19deg) translateY(0)}50%{transform:rotate(-19deg) translateY(-11px)}}
  @keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  @keyframes shimmer{0%,100%{opacity:.5;transform:translateX(-50%) scaleY(.9)}50%{opacity:.92;transform:translateX(-50%) scaleY(1.08)}}
  @keyframes sunpulse{0%,100%{box-shadow:0 0 120px 44px rgba(255,150,70,.46)}50%{box-shadow:0 0 160px 58px rgba(255,170,90,.66)}}
  @keyframes flicker{0%,97%,100%{opacity:1}98%{opacity:.6}99%{opacity:.85}}
  @keyframes rise{0%{opacity:0;transform:translateX(-50%) translateY(18px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
  @media (max-width:560px){.tl-palm{width:140px;height:240px}}
  @media (prefers-reduced-motion:reduce){.tl-tarpon,.tl-frond,.tl-glit,.tl-sun,.tl-sign .scr,.tl-card{animation:none}.tl-tarpon{transform:rotate(-19deg)}}
</style>
</head>
